<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoshire - Modern Retreat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('your-image-url.jpg');
            background-size: cover;
            border-radius: 40px;
        }
    </style>
</head>
<body class="p-6">

    <header class="hero-bg h-[500px] relative flex flex-col justify-between p-10 text-white overflow-hidden">
        <div class="flex justify-between items-center">
            <h1 class="text-4xl font-bold leading-tight">Your Modern <br> Retreat Today!</h1>
            <div class="flex gap-2">
                <span class="px-4 py-1 border border-white/50 rounded-full text-xs backdrop-blur-md">nature</span>
                <span class="px-4 py-1 border border-white/50 rounded-full text-xs backdrop-blur-md">modern</span>
            </div>
        </div>
        
        <button class="bg-white text-black px-6 py-2 rounded-full w-fit font-semibold flex items-center gap-2">
            GET STARTED <span class="bg-black text-white rounded-full p-1 text-[10px]">→</span>
        </button>
    </header>

    <section class="mt-10 bg-[#2d1b15] rounded-[40px] p-10 flex flex-col md:flex-row gap-10 items-center">
        
        <div class="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">Booking is confirmed!</h3>
                <img src="https://via.placeholder.com/50" class="rounded-xl" alt="thumb">
            </div>
            
            <div class="space-y-3 text-sm text-gray-600">
                <div class="flex justify-between border-b pb-2"><span>Check In</span> <span class="font-semibold text-black">10.07.2023</span></div>
                <div class="flex justify-between border-b pb-2"><span>Check Out</span> <span class="font-semibold text-black">12.08.2023</span></div>
                <div class="flex justify-between border-b pb-2"><span>Guests</span> <span class="font-semibold text-black">5 people</span></div>
            </div>

            <button class="w-full mt-6 bg-[#3d2a23] text-white py-3 rounded-xl font-medium">
                Booking details
            </button>
        </div>

        <div class="text-white flex-1">
            <h2 class="text-5xl font-light mb-4">Book Your Magical <br> Getaway Now!</h2>
            <p class="text-gray-400 mb-6 max-w-md">Expand your knowledge, connect with the community and create a personalised network that is right for you.</p>
            
            <div class="flex items-center gap-4">
                <button class="border border-white/30 px-6 py-2 rounded-full hover:bg-white hover:text-black transition">
                    Join community
                </button>
            </div>
        </div>
    </section>

</body>
</html>
