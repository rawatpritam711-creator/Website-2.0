<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pro UI Clone</title>

  <link rel="stylesheet" href="style.css">

  <!-- Locomotive Scroll -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">

</head>
<body>

<div id="cursor"></div>

<div data-scroll-container>

  <section class="hero">
    <h1 data-scroll data-scroll-speed="2">Modern UI Clone</h1>
    <p data-scroll data-scroll-speed="1">Smooth + Premium + Animated</p>
  </section>

  <section class="cards">

    <div class="card" data-scroll data-scroll-speed="2">
      <h2>Design</h2>
    </div>

    <div class="card" data-scroll data-scroll-speed="-2">
      <h2>Animation</h2>
    </div>

    <div class="card" data-scroll data-scroll-speed="1">
      <h2>Experience</h2>
    </div>

  </section>

</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- Locomotive -->
<script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>

<script src="script.js"></script>

</body>
</html>
