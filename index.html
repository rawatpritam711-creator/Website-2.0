<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Modern Website</title>

<style>
  body {
    margin: 0;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  .content {
    position: relative;
    z-index: 10;
    padding: 100px;
  }

  h1 {
    font-size: 60px;
  }

  p {
    font-size: 20px;
    max-width: 500px;
  }

  .glass {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
    margin-top: 30px;
  }
</style>
</head>

<body>

<div class="content">
  <h1>3D Website</h1>
  <p>Modern futuristic 3D design with animations</p>

  <div class="glass">
    Scroll down for effects 👇
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Geometry
  const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
  const material = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    metalness: 0.8,
    roughness: 0.2
  });

  const shape = new THREE.Mesh(geometry, material);
  scene.add(shape);

  // Light
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(5,5,5);
  scene.add(light);

  camera.position.z = 5;

  // Mouse movement
  document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 2;
    let y = (e.clientY / window.innerHeight - 0.5) * 2;

    shape.rotation.y = x * 2;
    shape.rotation.x = y * 2;
  });

  // Scroll animation
  window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    shape.rotation.z = scroll * 0.01;
  });

  function animate() {
    requestAnimationFrame(animate);

    shape.rotation.x += 0.01;
    shape.rotation.y += 0.01;

    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
