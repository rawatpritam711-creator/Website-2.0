<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ocean UI Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Navbar -->
  <nav>
    <h2 class="logo">Amway</h2>
    <ul>
      <li class="active">HOME</li>
      <li>ABOUT</li>
      <li>PRODUCTS</li>
      <li>SERVICE</li>
      <li>CONTACT</li>
    </ul>
  </nav>

  <!-- Slider -->
  <div class="hero">

    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">
      <div class="overlay"></div>

      <div class="content">
        <div class="left">
          <h1>Happiness<br>comes<br>in waves</h1>
          <p>Feel the ocean vibes with smooth UI design</p>
          <button>READ MORE</button>
        </div>

        <div class="right">
          <h1>FLOW<br>WITH<br>IT</h1>
          <span id="counter">01 / 03</span>
        </div>
      </div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
